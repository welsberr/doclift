version: "3.9"

services:
  doclift:
    build: .
    working_dir: /workspace
    volumes:
      - ./:/app
      - ${DOCLIFT_WORKSPACE:-/tmp}:/workspace
    environment:
      PYTHONUNBUFFERED: "1"
      XDG_CONFIG_HOME: /tmp/doclift-config
      XDG_CACHE_HOME: /tmp/doclift-cache
      XDG_RUNTIME_DIR: /tmp/doclift-runtime
    entrypoint: ["doclift"]

  shell:
    build: .
    working_dir: /workspace
    volumes:
      - ./:/app
      - ${DOCLIFT_WORKSPACE:-/tmp}:/workspace
    environment:
      PYTHONUNBUFFERED: "1"
      XDG_CONFIG_HOME: /tmp/doclift-config
      XDG_CACHE_HOME: /tmp/doclift-cache
      XDG_RUNTIME_DIR: /tmp/doclift-runtime
    entrypoint: ["/bin/bash"]
